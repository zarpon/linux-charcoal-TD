name: Export full Valve kernel source

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Fetch complete target kernel source
        run: |
          set -Eeuo pipefail
          git clone --depth 1 --branch 6.16.12-valve27 \
            https://github.com/evlaV/linux-integration.git kernel-source
          git -C kernel-source rev-parse HEAD > kernel-source-commit.txt

      - name: Package complete source and project snapshot
        run: |
          set -Eeuo pipefail
          tar --exclude=.git -C kernel-source -I 'zstd -10 -T0' \
            -cf valve-linux-6.16.12-valve27.tar.zst .
          git archive --format=tar HEAD | zstd -10 -T0 \
            -o linux-charcoal-vulcano-validation.tar.zst
          sha256sum valve-linux-6.16.12-valve27.tar.zst \
            linux-charcoal-vulcano-validation.tar.zst \
            > source-archives.sha256

      - name: Upload full source artifact
        uses: actions/upload-artifact@v4
        with:
          name: valve-linux-6.16.12-full-source
          path: |
            valve-linux-6.16.12-valve27.tar.zst
            linux-charcoal-vulcano-validation.tar.zst
            kernel-source-commit.txt
            source-archives.sha256
          compression-level: 0
          retention-days: 1
          if-no-files-found: error
