name: Build

on:
  push:
  pull_request:
    types: [opened, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize Disk Space (Ultra-Aggressive)
        run: |
          # Remove grandes runtimes e SDKs que ocupam ~25GB+
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/boost /usr/lib/jvm
          sudo rm -rf /usr/share/swift /usr/local/share/powershell /usr/share/azure-cli /opt/az
          sudo rm -rf "/usr/local/share/chromium" "/usr/local/lib/node_modules"
          
          # Limpa caches de pacotes e arquivos temporários do sistema
          sudo apt-get autoremove -y >/dev/null 2>&1
          sudo apt-get autoclean -y >/dev/null 2>&1
          sudo docker image prune -af
          
          # Limpeza profunda em /opt preservando apenas o essencial para o runner
          find /opt/ -maxdepth 1 -mindepth 1 '!' -path /opt/containerd '!' -path /opt/actionarchivecache '!' -path /opt/runner '!' -path /opt/runner-cache -exec sudo rm -rf '{}' ';'
          
          echo "Espaço disponível após limpeza:"
          df -h /

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 2 

      - name: Build docker image
        run: docker build . -t charcoal

      - name: Build Kernel
        run: |
          chmod -R a+rw .
          
          # Alterado para usar todos os núcleos disponíveis com $(nproc)
          docker run --rm -v ${PWD}:/project charcoal sudo -u nobody bash -c "export MAKEFLAGS=\"-j$(nproc)\" && makepkg -Ccf"

      - name: Upload Artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-charcoal
          path: linux-charcoal-*.pkg.tar.zst
