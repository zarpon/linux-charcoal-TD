name: Build

on:
  push:
  pull_request:
    types: [opened, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Free up space (Aggressive)
        run: |
          # Remove ferramentas pesadas que não usamos na compilação do kernel
          sudo rm -rf /usr/local/share/boost /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          sudo rm -rf /usr/share/swift /usr/local/share/powershell /usr/share/azure-cli
          # Limpa caches de pacotes
          sudo apt-get clean
          # Limpeza de diretórios do sistema
          find /opt/ -maxdepth 1 -mindepth 1 '!' -path /opt/containerd '!' -path /opt/actionarchivecache '!' -path /opt/runner '!' -path /opt/runner-cache -exec rm -rf '{}' ';'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 2 # Reduzido para 2GB para sobrar espaço em disco para os arquivos do Kernel

      - name: Check Disk Space
        run: df -h # Adicionado para monitorarmos quanto espaço resta antes do build

      - name: Get current tag
        if: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
        run: echo "current_tag=$(git describe --tags --abbrev=0 --exact-match 2>/dev/null || echo '')" >> $GITHUB_ENV

      - name: Build docker image
        run: docker build . -t charcoal

      - name: Build Kernel
        run: |
          chmod -R a+rw .
          # O segredo aqui é o -j2 para não estourar a RAM e o chmod para evitar overhead de I/O
          docker run --rm -v ${PWD}:/project charcoal sudo -u nobody bash -c "export MAKEFLAGS='-j2' && makepkg -Ccf"

      - name: Upload Artifacts
        if: ${{ ! env.current_tag }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-charcoal
          path: linux-charcoal-*.pkg.tar.zst
          if-no-files-found: warn

      - name: Publish release
        if: ${{ env.current_tag }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.current_tag }}
          name: ${{ env.current_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: linux-charcoal-*.pkg.tar.zst
