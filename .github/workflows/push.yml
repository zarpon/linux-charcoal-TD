name: Build

on:
  push:
  pull_request:
    types: [opened, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Free up space (Manual Cleanup)
        run: |
          # Remove pacotes grandes pré-instalados para ganhar ~10GB de espaço real
          sudo rm -rf /usr/local/share/boost /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          # Limpeza de diretórios do sistema preservando o necessário para o runner
          find /opt/ -maxdepth 1 -mindepth 1 '!' -path /opt/containerd '!' -path /opt/actionarchivecache '!' -path /opt/runner '!' -path /opt/runner-cache -exec rm -rf '{}' ';'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 5  # 5GB é o ideal: ajuda a RAM sem esgotar o armazenamento do SSD

      - name: Get current tag
        if: ${{ github.event_name == 'push' && github.ref_name == 'master' }}
        run: echo "current_tag=$(git describe --tags --abbrev=0 --exact-match 2>/dev/null || echo '')" >> $GITHUB_ENV

      - name: Get previous tag
        if: ${{ env.current_tag }}
        run: echo "previous_tag=$(git describe --tags --abbrev=0 ${{ env.current_tag }}^ 2>/dev/null || echo '')" >> $GITHUB_ENV

      - name: Generate changelog
        id: changelog
        uses: jaywcjlove/changelog-generator@main
        if: ${{ env.current_tag && env.previous_tag }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docker image
        run: docker build . -t charcoal

      - name: Build Kernel
        run: |
          # Concede permissão total à pasta de trabalho para evitar erros de escrita do Docker
          chmod -R a+rw .
          # Executa o build limitando a 2 threads para estabilidade total de memória
          docker run --rm -v ${PWD}:/project charcoal sudo -u nobody bash -c "export MAKEFLAGS='-j2' && makepkg -Ccf"

      - name: Upload Artifacts
        if: ${{ ! env.current_tag }}
        uses: actions/upload-artifact@v4
        with:
          name: linux-charcoal
          path: linux-charcoal-*.pkg.tar.zst
          if-no-files-found: warn

      - name: Publish release
        if: ${{ env.current_tag }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.current_tag }}
          name: ${{ env.current_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifactErrorsFailBuild: true
          artifactContentType: application/zstd
          body: ${{ steps.changelog.outputs.changelog }}
          artifacts: linux-charcoal-*.pkg.tar.zst
