name: Cancel all pre-existing workflow runs

on:
  push:
    branches:
      - automation/cancel-all-runs-final-20260723

permissions:
  actions: write
  contents: write

jobs:
  cancel:
    name: Cancel pre-existing runs
    runs-on: ubuntu-latest
    steps:
      - name: Cancel every active run except this cleanup run
        env:
          GH_TOKEN: ${{ github.token }}
          SELF_RUN_ID: ${{ github.run_id }}
        run: |
          set -uo pipefail

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100"
          mapfile -t run_ids < <(
            curl --silent --show-error --fail               --header "Authorization: Bearer ${GH_TOKEN}"               --header "Accept: application/vnd.github+json"               "${api}" |
              jq -r --arg self "${SELF_RUN_ID}" '
                .workflow_runs[]
                | select((.id | tostring) != $self)
                | select(.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "pending" or .status == "requested")
                | .id
              '
          )

          failures=0
          for run_id in "${run_ids[@]}"; do
            [ -n "${run_id}" ] || continue
            cancelled=0
            for attempt in 1 2 3 4 5; do
              response_file="/tmp/cancel-${run_id}.json"
              status="$(
                curl --silent --show-error                   --output "${response_file}"                   --write-out '%{http_code}'                   --request POST                   --header "Authorization: Bearer ${GH_TOKEN}"                   --header "Accept: application/vnd.github+json"                   "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" ||
                true
              )"
              case "${status}" in
                202|204|404|409)
                  echo "Cancellation accepted for run ${run_id} (HTTP ${status})."
                  cancelled=1
                  break
                  ;;
                500|502|503|504)
                  echo "Transient HTTP ${status} while cancelling run ${run_id}; retry ${attempt}/5."
                  sleep 5
                  ;;
                *)
                  echo "Could not cancel run ${run_id} (HTTP ${status})."
                  cat "${response_file}" 2>/dev/null || true
                  break
                  ;;
              esac
            done
            if [ "${cancelled}" -ne 1 ]; then
              failures=1
            fi
          done

          if [ "${failures}" -ne 0 ]; then
            exit 1
          fi

      - name: Remove temporary cleanup branches
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          for ref in             automation/cancel-active-workflows-20260723             automation/cancel-active-workflows-retry-20260723             automation/cancel-all-runs-final-20260723
          do
            response_file="/tmp/delete-${ref//\//-}.json"
            status="$(
              curl --silent --show-error                 --output "${response_file}"                 --write-out '%{http_code}'                 --request DELETE                 --header "Authorization: Bearer ${GH_TOKEN}"                 --header "Accept: application/vnd.github+json"                 "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/refs/heads/${ref}" ||
              true
            )"
            case "${status}" in
              204|404|422)
                echo "Cleanup branch ${ref}: HTTP ${status}."
                ;;
              *)
                echo "Could not delete cleanup branch ${ref} (HTTP ${status})."
                cat "${response_file}" 2>/dev/null || true
                exit 1
                ;;
            esac
          done
